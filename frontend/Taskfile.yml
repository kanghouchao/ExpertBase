version: "3"

tasks:
  install:
    desc: Install frontend dependencies
    cmds:
      - bun install

  dev:
    desc: Start the Next.js development server
    cmds:
      - bun run dev

  lint:
    desc: Run ESLint
    cmds:
      - bun run lint

  format:
    desc: Format frontend files with Prettier
    cmds:
      - bun run format

  format:check:
    desc: Check frontend formatting with Prettier
    cmds:
      - bun run format:check

  build:
    desc: Build the frontend for production
    cmds:
      - bun run build
