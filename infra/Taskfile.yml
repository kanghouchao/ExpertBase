version: "3"

vars:
  ENV: '{{.ENV | default "development"}}'
  COMPOSE_FILE: "compose.{{.ENV}}.yml"
  ENV_FILE: "env/{{.ENV}}.env"
  ENV_EXAMPLE_FILE: "env/{{.ENV}}.env.example"

tasks:
  init-env:
    desc: Create env/{{.ENV}}.env from env/{{.ENV}}.env.example when missing
    cmds:
      - test -f {{.ENV_EXAMPLE_FILE}}
      - test -f {{.ENV_FILE}} || cp {{.ENV_EXAMPLE_FILE}} {{.ENV_FILE}}

  config:
    desc: Validate and render Docker Compose configuration
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} config

  config-app:
    desc: Validate and render Docker Compose configuration including app services
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} --profile app config

  up:
    desc: Start infrastructure services
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} up -d

  up-app:
    desc: Start infrastructure plus frontend and backend services
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} --profile app up -d

  down:
    desc: Stop infrastructure services
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} down

  down-app:
    desc: Stop infrastructure plus frontend and backend services
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} --profile app down

  ps:
    desc: Show service status
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} ps

  logs:
    desc: Follow logs, for example `task logs -- postgres`
    deps:
      - init-env
    cmds:
      - docker compose --env-file {{.ENV_FILE}} -f {{.COMPOSE_FILE}} logs -f {{.CLI_ARGS}}
