name: ${COMPOSE_PROJECT_NAME:-expertbase}

services:
  traefik:
    image: traefik:v3.6
    container_name: ${COMPOSE_PROJECT_NAME:-expertbase}-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-expertbase}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expertbase}
      POSTGRES_USER: ${POSTGRES_USER:-expertbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.0-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-expertbase}-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-expertbase}-minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-expertbase}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-expertbase/backend:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-expertbase}-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-Expert Base API}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-expertbase}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-expertbase}
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: ${MINIO_BUCKET:-expertbase}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.backend.rule: Host(`${API_HOST:-api.expertbase.example.com}`)
      traefik.http.routers.backend.entrypoints: web
      traefik.http.services.backend.loadbalancer.server.port: "8000"

  frontend:
    image: ${FRONTEND_IMAGE:-expertbase/frontend:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-expertbase}-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api.expertbase.example.com}
    depends_on:
      - backend
    labels:
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: Host(`${APP_HOST:-expertbase.example.com}`)
      traefik.http.routers.frontend.entrypoints: web
      traefik.http.services.frontend.loadbalancer.server.port: "3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
